<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload Academic Material</title>
  <link rel="stylesheet" href="upload.css">
</head>
<body>

  <div class="form-card">
    <div class="header-icon">
      
    </div>

    <h2>Booknest</h2>
    <p class="subtitle">Upload your research and material securely</p>

    <form id="uploadForm">
      <div class="form-group">
        <label class="form-label" for="fullName">Full Name</label>
        <input type="text" id="fullName" placeholder="e.g., Jane Doe" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="materialTitle">Material Title</label>
        <input type="text" id="materialTitle" placeholder="e.g., Intro to Quantum Physics Notes" required>
      </div>

      <div class="form-group">
        <label class="form-label">I am a:</label>
        <div class="role-toggle">
          <input type="radio" id="student" name="userRole" value="Student" checked>
          <label for="student">Student</label>

          <input type="radio" id="lecturer" name="userRole" value="Lecturer">
          <label for="lecturer">Lecturer</label>

          <input type="radio" id="visitor" name="userRole" value="Visitor">
          <label for="visitor">Visitor</label>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Upload Document</label>
        <div class="file-dropzone" id="dropzone">
          <svg class="dropzone-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          <span id="fileNameDisplay">Click or drag file here</span>
          <p class="file-hint">Allowed: PDF, DOC, DOCX (Max 25 MB)</p>
          <input type="file" id="academicFile" accept=".pdf,.doc,.docx" required>
        </div>
      </div>

      <button type="submit" class="submit-btn">Submit Material</button>
      
      <div id="statusMessage" class="msg"></div>
    </form>
  </div>
  
  <script src="upload.js"></script>
</body>
</html>
